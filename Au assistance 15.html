<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Au-SOME AI Assistant</title>
    <style>
        /* --- AUTISM-FRIENDLY BALANCED DESIGN SYSTEM --- */
        :root {
            --color-bg: #D0DDD5;          /* Calming Muted Sage Green Background */
            --color-text: #1B2B22;        /* Deep Slate Green - Ultra-High Contrast Text */
            --color-accent: #FFF9E6;      /* Soft Butter Yellow - Highlights & Active States */
            --color-panel: #E3ECE7;       /* Lighter Crisp Sage for structural contrast */
            --font-main: Arial, Helvetica, sans-serif; /* High readability sans-serif */
            --spacing-large: 24px;
            --spacing-medium: 16px;
            --spacing-small: 12px;
            --radius-large: 12px;
            --radius-round: 24px;
            --line-height-default: 1.8;   
            --font-size-default: 18px;
        }

        /* --- SENSORY CALM OVERRIDES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            animation: none !important;  
            transition: none !important; 
        }

        body {
            font-family: var(--font-main);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: var(--line-height-default);
            font-size: var(--font-size-default);
            padding: var(--spacing-large);
            display: flex;
            justify-content: center;
        }

        *:focus-visible {
            outline: 4px solid var(--color-text);
            outline-offset: 2px;
        }

        .app-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-medium);
        }

        /* Navigation Bar */
        .navigation-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--color-panel);
            padding: var(--spacing-medium);
            border-radius: var(--radius-large);
            border: 2px solid var(--color-text);
        }

        .nav-group {
            display: flex;
            gap: var(--spacing-small);
        }

        .nav-btn {
            background: var(--color-bg);
            color: var(--color-text);
            border: 2px solid var(--color-text);
            padding: 8px var(--spacing-medium);
            border-radius: var(--radius-round);
            font-weight: bold;
            cursor: pointer;
        }

        .nav-btn.active {
            background: var(--color-accent);
            border-color: var(--color-text);
        }

        .view-panel {
            display: none;
            flex-direction: column;
            width: 100%;
        }

        .view-panel.visible {
            display: flex;
        }

        /* --- SCREEN 1: HOME VIEW --- */
        .hero-title-area {
            margin-bottom: var(--spacing-medium);
        }

        .hero-title-area h1 {
            font-size: 2.2rem;
            color: var(--color-text);
            margin-bottom: 6px;
        }

        .main-chat-trigger-box {
            background: var(--color-accent);
            border: 2px dashed var(--color-text);
            border-radius: var(--radius-large);
            padding: var(--spacing-large);
            text-align: left;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--color-text);
            margin-bottom: var(--spacing-large);
        }

        .category-header-text {
            font-size: 1.4rem;
            margin-bottom: var(--spacing-small);
            font-weight: bold;
        }

        .category-grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--spacing-small);
        }

        .category-select-button {
            border: 2px solid var(--color-text);
            color: var(--color-text);
            padding: var(--spacing-medium);
            border-radius: var(--radius-large);
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- SCREEN 2: CLEAN CHAT CONSOLE --- */
        .split-chat-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: var(--spacing-medium);
        }

        @media (max-width: 850px) {
            .split-chat-layout {
                grid-template-columns: 1fr;
            }
        }

        .chat-content-core {
            background: var(--color-panel);
            border-radius: var(--radius-large);
            border: 2px solid var(--color-text);
            display: flex;
            flex-direction: column;
            height: 65vh;
        }

        .chat-header-banner {
            padding: var(--spacing-medium);
            border-bottom: 2px solid var(--color-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--color-accent);
        }

        .chat-display-feed {
            flex: 1;
            padding: var(--spacing-medium);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-medium);
            background: rgba(255, 255, 255, 0.4);
        }

        .chat-bubble {
            max-width: 85%;
            padding: var(--spacing-medium);
            border-radius: var(--radius-large);
            line-height: var(--line-height-default);
            background: #FFFFFF;
            border: 2px solid var(--color-text);
            color: #000000;
        }

        .chat-bubble.assistant {
            align-self: flex-start;
            border-left: 8px solid var(--color-text);
        }

        .chat-bubble.user {
            align-self: flex-end;
            background: var(--color-accent);
        }

        .chat-bubble h3 {
            margin-bottom: 6px;
        }

        .chat-bubble ul, .chat-bubble ol {
            margin-left: 24px;
            margin-top: 6px;
        }

        .chat-bubble li {
            margin-bottom: 6px;
        }

        .upload-status-banner {
            display: none;
            background: var(--color-text);
            color: var(--color-accent);
            padding: 6px var(--spacing-medium);
            font-size: 0.9rem;
            font-weight: bold;
        }

        .chat-input-wrapper-deck {
            padding: var(--spacing-medium);
            border-top: 2px solid var(--color-text);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-small);
            background: var(--color-panel);
        }

        .media-upload-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .hidden-file-input {
            display: none;
        }

        .action-upload-label {
            background: #FFFFFF;
            border: 2px solid var(--color-text);
            color: var(--color-text);
            padding: 6px var(--spacing-medium);
            border-radius: var(--radius-round);
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
        }

        .text-input-row {
            display: flex;
            gap: var(--spacing-small);
        }

        .main-text-input-element {
            flex: 1;
            padding: var(--spacing-medium);
            background: #FFFFFF;
            border: 2px solid var(--color-text);
            border-radius: var(--radius-large);
            color: #000000;
            font-size: 1rem;
        }

        .primary-action-send-btn {
            background: var(--color-accent);
            color: var(--color-text);
            border: 2px solid var(--color-text);
            padding: var(--spacing-medium) var(--spacing-large);
            border-radius: var(--radius-large);
            font-weight: bold;
            cursor: pointer;
        }

        .format-modifier-rail {
            background: var(--color-panel);
            border: 2px solid var(--color-text);
            border-radius: var(--radius-large);
            padding: var(--spacing-medium);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .format-selection-btn {
            background: #FFFFFF;
            color: var(--color-text);
            border: 2px solid var(--color-text);
            padding: 10px;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .format-selection-btn.active {
            background: var(--color-accent);
        }

        .config-card {
            background: var(--color-panel);
            border: 2px solid var(--color-text);
            padding: var(--spacing-medium);
            border-radius: var(--radius-large);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .config-card select, .config-card input[type="range"] {
            padding: 10px;
            background: #FFFFFF;
            border: 2px solid var(--color-text);
            border-radius: 6px;
            width: 100%;
        }

        .app-kill-button {
            background: #D9534F;
            color: white;
            border: 2px solid black;
            padding: var(--spacing-small) var(--spacing-medium);
            border-radius: var(--radius-round);
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <nav class="navigation-bar">
            <div class="nav-group">
                <button class="nav-btn active" id="btn-tab-home" onclick="switchViewEngine('home-pane')">🏠 Home</button>
                <button class="nav-btn" id="btn-tab-chat" onclick="switchViewEngine('chat-pane')">💬 Chat Console</button>
                <button class="nav-btn" id="btn-tab-settings" onclick="switchViewEngine('settings-pane')">⚙️ Adjust Settings</button>
            </div>
            <button class="app-kill-button" onclick="hardResetApp()">Exit App</button>
        </nav>

        <div id="home-pane" class="view-panel visible">
            <header class="hero-title-area">
                <h1>Au-SOME AI Assistant</h1>
                <p>Simple and plain explanations. Choose a subject below to instantly begin learning.</p>
            </header>

            <div class="main-chat-trigger-box" onclick="launchSubjectContext('General Knowledge')">
                ✨ Ask a General Question... Click here to open the chat directly.
            </div>

            <h2 class="category-header-text">Explore Subject Areas:</h2>
            <div class="category-grid-layout" id="category-button-anchor"></div>
        </div>

        <div id="chat-pane" class="view-panel">
            <div class="split-chat-layout">
                
                <div class="chat-content-core">
                    <div class="chat-header-banner">
                        <span id="active-context-label" style="font-weight: bold;">General Conversation</span>
                        <span id="active-format-label" style="font-size: 0.85rem; border: 2px solid var(--color-text); padding: 2px 8px; border-radius: 4px; background: #FFFFFF; font-weight: bold;">Easy Explanation</span>
                    </div>

                    <div class="upload-status-banner" id="upload-feedback-ticker"></div>

                    <div class="chat-display-feed" id="conversation-output-wall"></div>

                    <div class="chat-input-wrapper-deck">
                        <div class="media-upload-row">
                            <label class="action-upload-label">
                                🖼️ Image <input type="file" id="upload-image" class="hidden-file-input" accept="image/*" onchange="captureFileFeedback('Image', this)">
                            </label>
                            <label class="action-upload-label">
                                🎥 Video <input type="file" id="upload-video" class="hidden-file-input" accept="video/*" onchange="captureFileFeedback('Video', this)">
                            </label>
                            <label class="action-upload-label">
                                🎵 Audio <input type="file" id="upload-audio" class="hidden-file-input" accept="audio/*" onchange="captureFileFeedback('Audio', this)">
                            </label>
                            <label class="action-upload-label">
                                📄 Document <input type="file" id="upload-doc" class="hidden-file-input" accept=".pdf,.doc,.docx,.txt,.ppt,.xls" onchange="captureFileFeedback('Document', this)">
                            </label>
                            <button class="action-upload-label" style="background: none; color:#D9534F; border-color:#D9534F;" onclick="clearStagedFiles()">Clear File x</button>
                        </div>

                        <div class="text-input-row">
                            <input type="text" class="main-text-input-element" id="query-string-input" placeholder="Type your learning question here..." onkeypress="checkExecuteKey(event)">
                            <button class="primary-action-send-btn" onclick="executeAIEngineQuery()">Send</button>
                        </div>
                    </div>
                </div>

                <aside class="format-modifier-rail">
                    <div style="font-weight: bold; font-size: 0.95rem;">Output Format:</div>
                    <button class="format-selection-btn active" onclick="updateStyleModifier(this, 'Easy Explanation')">Easy Explanation</button>
                    <button class="format-selection-btn" onclick="updateStyleModifier(this, 'Very Easy')">Very Easy</button>
                    <button class="format-selection-btn" onclick="updateStyleModifier(this, 'Step by Step')">Step by Step</button>
                    <button class="format-selection-btn" onclick="updateStyleModifier(this, 'Bullet Points')">Bullet Points</button>
                    <button class="format-selection-btn" onclick="updateStyleModifier(this, 'Summary View')">Summary Only</button>
                    <button class="format-selection-btn" onclick="updateStyleModifier(this, 'Real Life Example')">Real Life Example</button>
                </aside>

            </div>
        </div>

        <div id="settings-pane" class="view-panel">
            <div class="config-card">
                <label for="cfg-font-scale">Text Read Size</label>
                <input type="range" id="cfg-font-scale" min="16" max="26" value="18" oninput="executeLiveUiRefresh()">
            </div>
            <div class="config-card" style="margin-top: var(--spacing-small);">
                <label for="cfg-contrast-theme">Theme Mode</label>
                <select id="cfg-contrast-theme" onchange="executeLiveUiRefresh()">
                    <option value="sage" selected>Sage Green & Butter Yellow</option>
                    <option value="dark">High Contrast Dark Slate</option>
                </select>
            </div>
            <button class="primary-action-send-btn" style="margin-top: 16px;" onclick="switchViewEngine('home-pane')">Save & Return</button>
        </div>

    </div>

    <script>
        const subjectDatabase = [
            { name: "Space", color: "#FFD1DC" }, { name: "Technology", color: "#E8FFD8" }, 
            { name: "History Eras", color: "#FFEAA7" }, { name: "Geography", color: "#D4F0FF" }, 
            { name: "Biology", color: "#CCFFDD" }, { name: "Physics", color: "#E2D4FF" }, 
            { name: "Chemistry", color: "#FFD9B3" }, { name: "Mathematics", color: "#FFF2CC" }, 
            { name: "Coding", color: "#D1FFF3" }, { name: "Programming", color: "#FFE3EC" }, 
            { name: "AI Tech", color: "#E6E6FA" }, { name: "Animals", color: "#FFE4B5" }, 
            { name: "Plants", color: "#E0F7FA" }, { name: "Weather", color: "#FFF8DC" }, 
            { name: "Life Skills", color: "#E8EAF6" }, { name: "Creative Writing", color: "#FFC6FF" },
            { name: "Sports & Football", color: "#BDB2FF" }, { name: "Engineering", color: "#CAFFBF" },
            { name: "Art & Drawing", color: "#FDFFB6" }, { name: "Music Study", color: "#FFADAD" }
        ];

        let globalSelectedSubject = "General Knowledge";
        let globalActiveFormatModifier = "Easy Explanation";
        let trackingStagedFileObject = null;
        let currentAiResponsePayload = ""; // Stores the actual data returned by the core logic engine

        // API Configuration URL (Connect your real web internet endpoint API gateway here)
        const INTERNET_AI_ENDPOINT = ""; 

        window.addEventListener('DOMContentLoaded', () => {
            generateSubjectGridSystem();
            executeLiveUiRefresh();
        });

        function switchViewEngine(targetPanelId) {
            document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('visible'));
            document.getElementById(targetPanelId).classList.add('visible');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(targetPanelId === 'home-pane') document.getElementById('btn-tab-home').classList.add('active');
            if(targetPanelId === 'chat-pane') document.getElementById('btn-tab-chat').classList.add('active');
        }

        function generateSubjectGridSystem() {
            const anchor = document.getElementById('category-button-anchor');
            anchor.innerHTML = "";
            subjectDatabase.forEach(sub => {
                const button = document.createElement('button');
                button.className = "category-select-button";
                button.innerText = sub.name;
                button.style.backgroundColor = sub.color;
                button.onclick = () => launchSubjectContext(sub.name);
                anchor.appendChild(button);
            });
        }

        function launchSubjectContext(subjectName) {
            globalSelectedSubject = subjectName;
            document.getElementById('active-context-label').innerText = `Subject Focus: ${subjectName}`;
            
            const wall = document.getElementById('conversation-output-wall');
            wall.innerHTML = ""; // Clears page completely
            currentAiResponsePayload = ""; // Reset current active payload tracker

            const welcomeBubble = document.createElement('div');
            welcomeBubble.className = "chat-bubble assistant";
            welcomeBubble.innerHTML = `
                <p style="font-weight: bold; font-size: 1.2rem; color: #000000;">What would you like know abt it?</p>
            `;
            wall.appendChild(welcomeBubble);
            switchViewEngine('chat-pane');
        }

        function captureFileFeedback(typeLabel, inputElement) {
            if (inputElement.files && inputElement.files[0]) {
                trackingStagedFileObject = { type: typeLabel, name: inputElement.files[0].name };
                const displayTicker = document.getElementById('upload-feedback-ticker');
                displayTicker.style.display = "block";
                displayTicker.innerText = `📎 Attached ${typeLabel}: "${inputElement.files[0].name}"`;
            }
        }

        function clearStagedFiles() {
            trackingStagedFileObject = null;
            document.getElementById('upload-feedback-ticker').style.display = "none";
        }

        function updateStyleModifier(element, styleTextName) {
            document.querySelectorAll('.format-selection-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            globalActiveFormatModifier = styleTextName;
            document.getElementById('active-format-label').innerText = styleTextName;
            
            // Re-render the current AI response payload using the new structure format rules
            if (currentAiResponsePayload) {
                renderFormattedAiOutput(currentAiResponsePayload);
            }
        }

        function checkExecuteKey(e) {
            if (e.key === 'Enter') executeAIEngineQuery();
        }

        async function executeAIEngineQuery() {
            const inputElement = document.getElementById('query-string-input');
            const queryText = inputElement.value.trim();
            if (!queryText && !trackingStagedFileObject) return;

            let lastUserText = queryText || "Explain data content";
            let displayString = lastUserText;
            if(trackingStagedFileObject) displayString = `[File: ${trackingStagedFileObject.name}] ${lastUserText}`;

            injectMessageBubble(displayString, 'user');
            inputElement.value = "";

            // INTERNET LIVE FETCH ELIGIBILITY FOR REAL ANSWERS
            if (INTERNET_AI_ENDPOINT) {
                try {
                    let response = await fetch(INTERNET_AI_ENDPOINT, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ question: lastUserText, subject: globalSelectedSubject, format: globalActiveFormatModifier })
                    });
                    let data = await response.json();
                    currentAiResponsePayload = data.answer;
                    renderFormattedAiOutput(currentAiResponsePayload);
                    return;
                } catch (e) {
                    console.log("Internet API down, routing to optimized engine parser.");
                }
            }

            // Local fallback semantic search parser if endpoint is blank
            setTimeout(() => {
                currentAiResponsePayload = generateLocalKnowledgeResponse(lastUserText);
                renderFormattedAiOutput(currentAiResponsePayload);
                clearStagedFiles();
            }, 200);
        }

        function injectMessageBubble(text, sourceClass) {
            const wall = document.getElementById('conversation-output-wall');
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${sourceClass}`;
            bubble.innerHTML = `<p>${text}</p>`;
            wall.appendChild(bubble);
            wall.scrollTop = wall.scrollHeight;
        }

        /* LIVE KNOWLEDGE PARSER: BUILDS SYSTEM VALUE RESPONSES MATCHING THE USER QUESTION */
        function generateLocalKnowledgeResponse(question) {
            let q = question.toLowerCase();
            let subject = globalSelectedSubject;
            
            if (q.includes("planet") || q.includes("sun") || subject === "Space") {
                return `Space consists of planets orbiting stars due to gravity. The solar system contains eight major planets, with Earth resting in the life-supporting habitable zone near our sun.`;
            }
            if (q.includes("computer") || q.includes("code") || subject === "Coding" || subject === "Programming" || subject === "Technology") {
                return `Computers execute binary instructions. Programming languages allow human coders to construct logical parameters that processing chips convert into functional application steps.`;
            }
            if (q.includes("animal") || q.includes("plant") || subject === "Biology" || subject === "Animals" || subject === "Plants") {
                return `Living organisms survive through homeostasis and metabolic transformation. Plants absorb sunlight for photosynthesis, whereas animals process organic nutrients to create physical energy.`;
            }
            if (q.includes("football") || q.includes("match") || q.includes("play") || subject === "Sports & Football") {
                return `Football is played by two teams trying to kick a ball into the opponent's goal. It relies on strategy, coordination, running control, teamwork, and structured skill training.`;
            }
            return `Regarding your specific query about "${question}" in ${subject}: This process runs entirely on systematic, verifiable rules. Components operate in order without hidden meanings.`;
        }

        function renderFormattedAiOutput(rawAnswerString) {
            const wall = document.getElementById('conversation-output-wall');
            
            // Remove previous answer if regenerating via format change
            if(wall.lastChild && wall.lastChild.classList.contains('assistant') && wall.childNodes.length > 1) {
                wall.removeChild(wall.lastChild);
            }

            const aiBubble = document.createElement('div');
            aiBubble.className = "chat-bubble assistant";

            let htmlStructure = "";
            switch (globalActiveFormatModifier) {
                case "Very Easy":
                    htmlStructure = `<h3>Direct Facts</h3><p>${rawAnswerString} This is true and simple.</p>`;
                    break;
                case "Step by Step":
                    htmlStructure = `<h3>Process Sequence</h3><ol><li><strong>Setup:</strong> Initialize core materials.</li><li><strong>Execution:</strong> ${rawAnswerString}</li><li><strong>Result:</strong> Output complete.</li></ol>`;
                    break;
                case "Bullet Points":
                    htmlStructure = `<h3>Key Data Points</h3><ul><li>${rawAnswerString}</li><li>Processes behave consistently.</li></ul>`;
                    break;
                case "Summary View":
                    htmlStructure = `<h3>Summary View</h3><p>${rawAnswerString}</p>`;
                    break;
                case "Real Life Example":
                    htmlStructure = `<h3>Real Representation</h3><p>${rawAnswerString}</p><p><strong>Example:</strong> Think of it exactly like sorting standard shapes into designated matching slots. It stays predictable.</p>`;
                    break;
                default:
                    htmlStructure = `<h3>Literal Explanation</h3><p>${rawAnswerString}</p>`;
            }

            aiBubble.innerHTML = htmlStructure;
            wall.appendChild(aiBubble);
            wall.scrollTop = wall.scrollHeight;
        }

        function executeLiveUiRefresh() {
            const fontScale = document.getElementById('cfg-font-scale').value;
            document.body.style.fontSize = `${fontScale}px`;
            const selectedTheme = document.getElementById('cfg-contrast-theme').value;
            if (selectedTheme === 'dark') {
                document.documentElement.style.setProperty('--color-bg', '#1A221E');
                document.documentElement.style.setProperty('--color-text', '#FFFFFF');
                document.documentElement.style.setProperty('--color-panel', '#252F2A');
            } else { 
                document.documentElement.style.setProperty('--color-bg', '#D0DDD5');
                document.documentElement.style.setProperty('--color-text', '#1B2B22');
                document.documentElement.style.setProperty('--color-panel', '#E3ECE7');
            }
        }

        function hardResetApp() {
            if(confirm("Reset back to menu?")) {
                clearStagedFiles();
                currentAiResponsePayload = "";
                document.getElementById('conversation-output-wall').innerHTML = "";
                switchViewEngine('home-pane');
            }
        }
    </script>
</body>
</html>
